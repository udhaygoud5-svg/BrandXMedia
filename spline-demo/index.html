<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spline 3D Demo – Vanilla JS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
    /* Ensure the canvas fills the viewport */
    #canvas3d {
      width: 100vw;
      height: 100vh;
      display: block;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    #canvas3d.loaded { opacity: 1; }
    /* Loading overlay */
    #loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      z-index: 10;
      transition: opacity 0.4s ease;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Loading overlay – shown while the scene downloads -->
  <div id="loader"><div class="spinner"></div></div>
  <!-- The 3D canvas -->
  <canvas id="canvas3d"></canvas>

  <script type="module">
    import { Application } from 'https://esm.sh/@splinetool/runtime';
    const canvas = document.getElementById('canvas3d');
    const loader = document.getElementById('loader');
    const spline = new Application(canvas);

    // Replace with your own Spline scene URL (exported as Vanilla JS code)
    const SCENE_URL = 'https://prod.spline.design/YOUR_SCENE_ID/scene.splinecode';

    spline.load(SCENE_URL).then(() => {
      console.log('✅ Scene loaded');
      loader.classList.add('hidden');
      canvas.classList.add('loaded');
    }).catch(err => {
      console.error('❌ Failed to load scene', err);
      loader.innerHTML = '<p style="color:#fff">Failed to load 3D scene.</p>';
    });
  </script>
</body>
</html>
